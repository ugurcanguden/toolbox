# 🚀 Toolbox - Optimized Docker Compose
# Production-ready configuration with performance optimizations

version: '3.9'

services:
  # 🎯 Main Application
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - NODE_ENV=production
    container_name: toolbox-app
    restart: unless-stopped
    
    # 🚀 Performance optimizations
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Port mapping
    ports:
      - "3000:3000"
    
    # 🌍 Environment variables
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
            - NEXT_PUBLIC_SITE_URL=https://free-dev-tools.net.tr
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TZ=UTC
      # 🎯 Node.js performance optimizations
      - NODE_OPTIONS=--max-old-space-size=1024
    
    # 🔍 Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 📊 Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 🔒 Security
    security_opt:
      - no-new-privileges:true
    
    # 📁 Volumes (if needed for persistent data)
    # volumes:
    #   - ./logs:/app/logs
    
    networks:
      - toolbox-network

  # 🌐 NGINX Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: toolbox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - toolbox
    networks:
      - toolbox-network
    # Only enable if you want NGINX in Docker
    profiles:
      - nginx

networks:
  toolbox-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
