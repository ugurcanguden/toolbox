version: '3.9'

services:
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toolbox-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      # Update NEXT_PUBLIC_SITE_URL with your server URL/domain
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - toolbox-network

networks:
  toolbox-network:
    driver: bridge
