trigger:
  tags:
    include:
      - prod-*

variables:
  - group: GlobalConfig

resources:
  repositories:
    - repository: common
      name: devops-common
      type: git

extends:
  template: pipelines/templates/docker-build-push.yml@common
  parameters:
    imageName: free-dev-tools
    registryPath: 'curio'
    dockerfilePath: 'Dockerfile.simple'
    manifestPath: 'manifests/services/free-dev-tools/deployment.yaml'
