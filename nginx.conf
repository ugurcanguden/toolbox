# 🚀 HIGH-PERFORMANCE NGINX CONFIGURATION
# Optimized for PageSpeed 80+ score
# Designed for Next.js applications

# 🔧 MAIN CONFIGURATION
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 🎯 WORKER CONNECTIONS - Optimized for high traffic
events {
    worker_connections 1024;
    use epoll; # Efficient event method for Linux
    multi_accept on; # Accept multiple connections at once
}

http {
    # 📊 BASIC SETTINGS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 🚀 PERFORMANCE SETTINGS
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off; # Hide nginx version for security
    
    # 🔒 SECURITY HEADERS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # 🗜️ COMPRESSION SETTINGS - Critical for PageSpeed
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2
        font/woff
        application/font-woff2
        application/font-woff;
    
    # 🔥 BROTLI COMPRESSION - Better than gzip
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2
        font/woff
        application/font-woff2
        application/font-woff;
    
    # 📦 PRELOAD COMPRESSED FILES
    gzip_static on;
    brotli_static on;
    
    # 🎨 FONT OPTIMIZATION
    location ~* \.(woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Vary "Accept-Encoding";
        
        # Preload fonts
        location ~* \.woff2$ {
            add_header Link "</fonts/inter-var.woff2>; rel=preload; as=font; type=font/woff2; crossorigin";
        }
    }
    
    # 🖼️ IMAGE OPTIMIZATION
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable WebP serving if available
        location ~* \.(jpg|jpeg|png)$ {
            add_header Vary "Accept";
            try_files $uri$webp_suffix $uri =404;
        }
    }
    
    # 📄 STATIC ASSETS - Long-term caching
    location ~* \.(js|css|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable compression for JS/CSS
        gzip_static on;
        brotli_static on;
    }
    
    # 🏠 MAIN SERVER BLOCK
    server {
        listen 80;
        server_name free-dev-tools.net.tr;
        
        # 🔄 REDIRECT HTTP TO HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name free-dev-tools.net.tr;
        
        # 🔒 SSL CONFIGURATION
        ssl_certificate /etc/ssl/certs/free-dev-tools.net.tr.crt;
        ssl_certificate_key /etc/ssl/private/free-dev-tools.net.tr.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # 🚀 HTTP/2 PUSH - Preload critical resources
        http2_push_preload on;
        
        # 📏 CLIENT SETTINGS
        client_max_body_size 10M;
        client_body_timeout 12;
        client_header_timeout 12;
        send_timeout 10;
        
        # 🎯 ROOT AND INDEX
        root /var/www/html;
        index index.html index.htm;
        
        # 🔍 SECURITY.TXT
        location = /.well-known/security.txt {
            add_header Content-Type "text/plain";
            return 200 "Contact: security@curioboxapp.info\nExpires: 2025-12-31T23:59:59.000Z\nPreferred-Languages: en, tr\nCanonical: https://free-dev-tools.net.tr/.well-known/security.txt\n";
        }
        
        # 🤖 ROBOTS.TXT
        location = /robots.txt {
            add_header Content-Type "text/plain";
            expires 1d;
            add_header Cache-Control "public";
        }
        
        # 🗺️ SITEMAP.XML
        location = /sitemap.xml {
            add_header Content-Type "application/xml";
            expires 1d;
            add_header Cache-Control "public";
        }
        
        # 📱 MANIFEST.JSON
        location = /manifest.json {
            add_header Content-Type "application/manifest+json";
            expires 1d;
            add_header Cache-Control "public";
        }
        
        # 🎨 FAVICON AND ICONS
        location = /favicon.ico {
            expires 1d;
            add_header Cache-Control "public";
        }
        
        location = /favicon.svg {
            expires 1d;
            add_header Cache-Control "public";
        }
        
        # 📦 NEXT.JS STATIC FILES - Maximum caching
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            
            # Enable compression
            gzip_static on;
            brotli_static on;
        }
        
        # 🖼️ IMAGES DIRECTORY
        location /images/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
        
        # 🎨 FONTS DIRECTORY
        location /fonts/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            add_header Vary "Accept-Encoding";
        }
        
        # 📄 PUBLIC ASSETS
        location /public/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
        
        # 🔄 NEXT.JS APPLICATION
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 🚀 PERFORMANCE HEADERS
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # ⏱️ TIMEOUTS
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # 🚫 SECURITY - Block sensitive files
        location ~ /\. {
            deny all;
        }
        
        location ~ ~$ {
            deny all;
        }
        
        # 📊 HEALTH CHECK
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
    
    # 📈 LOGGING
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
}
