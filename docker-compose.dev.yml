version: '3.9'

services:
  toolbox-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: toolbox-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    networks:
      - toolbox-network

networks:
  toolbox-network:
    driver: bridge
